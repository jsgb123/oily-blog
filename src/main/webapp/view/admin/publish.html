<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<style>
    .markdown-editor {
        display: flex;
        gap: 20px;
        margin-top: 10px;
    }

    .editor-pane {
        flex: 1;
    }

    .preview-pane {
        flex: 1;
        border-left: 1px solid #e2e8f0;
        padding-left: 20px;
    }

    .preview-pane h3 {
        margin-bottom: 10px;
        color: #4a5568;
    }

    .preview-content {
        min-height: 400px;
        max-height: 600px;
        overflow-y: auto;
        padding: 15px;
        background: #f7fafc;
        border-radius: 6px;
        font-size: 14px;
        line-height: 1.6;
    }

    .preview-content h1 {
        font-size: 24px;
        margin-bottom: 16px;
    }

    .preview-content h2 {
        font-size: 20px;
        margin: 16px 0 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #e2e8f0;
    }

    .preview-content code {
        background: #edf2f7;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 13px;
    }

    .preview-content pre {
        background: #faf9f6;
        color: #f7fafc;
        padding: 12px;
        border-radius: 6px;
        overflow-x: auto;
    }

    .preview-content pre code {
        background: transparent;
        color: inherit;
        padding: 0;
    }

    .preview-content blockquote {
        border-left: 4px solid #cbd5e0;
        padding-left: 16px;
        color: #4a5568;
        margin: 16px 0;
    }

    .toolbar {
        background: #f7fafc;
        border: 1px solid #e2e8f0;
        border-bottom: none;
        padding: 8px 12px;
        border-radius: 6px 6px 0 0;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .toolbar button {
        background: #fff;
        border: 1px solid #cbd5e0;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
    }

    .toolbar button:hover {
        background: #e2e8f0;
        border-color: #a0aec0;
    }

    .form-row {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-row .form-group {
        flex: 1;
    }

    .tag-input {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 8px;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        min-height: 42px;
    }

    .tag {
        background: #e2e8f0;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .tag .remove {
        cursor: pointer;
        color: #e53e3e;
        font-weight: bold;
    }

    .tag-input input {
        border: none;
        flex: 1;
        outline: none;
        padding: 4px;
    }

    .slug-hint {
        font-size: 12px;
        color: #718096;
        margin-top: 5px;
    }

    .slug-hint a {
        color: #667eea;
        cursor: pointer;
    }
</style>
#include("../common/admin_header.html")
#include("../common/admin_footer.html")
#set(title="发布文章",menu= "publish")
#@adminHeader()             

<form id="articleForm" method="post">
    <div class="form-group">
        <label>标题 *</label>
        <input type="text" id="title" name="title" required placeholder="输入文章标题...">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>URL别名 (slug)</label>
            <input type="text" id="slug" name="slug" placeholder="自动生成，可留空">
            <div class="slug-hint">
                用于URL：<span id="slugPreview">#(ctx)/article/</span>
                <a onclick="generateSlug()">自动生成</a>
            </div>
        </div>

        <div class="form-group">
            <label>分类</label>
            <select id="category_id" name="category_id">
                #for(cate : categories)
                <option value="#(cate.ID)">#(cate.NAME)</option>
                #end
            </select>
        </div>
    </div>

    <div class="form-group">
        <label>摘要</label>
        <textarea id="summary" name="summary" rows="3" style="min-height: 100px; resize: vertical;" placeholder="文章摘要，留空则自动从正文截取..."></textarea>
    </div>

    <div class="form-group">
        <label>标签</label>
        <div class="tag-input" id="tagContainer">
            <input type="text" id="tagInput" placeholder="输入标签后按回车添加">
        </div>
        <input type="hidden" id="tags" name="tags">
    </div>

    <div class="form-group">
        <label>内容 * (支持Markdown)</label>
        <div class="toolbar">
<button type="button" data-markdown="# " title="标题1">H1</button>
<button type="button" data-markdown="## " title="标题2">H2</button>
<button type="button" data-markdown="&#35;&#35;&#35; " title="标题3">H3</button>
<button type="button" data-markdown="**加粗文本**" title="粗体">B</button>
<button type="button" data-markdown="*斜体文本*" title="斜体">I</button>
<button type="button" data-markdown="```&#10;code&#10;```" title="代码块">&lt;/&gt;</button>
<button type="button" data-markdown="[链接](url)" title="链接">🔗</button>
<button type="button" data-markdown="![](url)" title="图片">🖼️</button>
<button type="button" data-markdown="- 列表项" title="无序列表">•</button>
<button type="button" data-markdown="1. 列表项" title="有序列表">1.</button>
<button type="button" data-markdown="> 引用" title="引用">"</button>
        </div>


        <div class="markdown-editor">
            <div class="editor-pane">
                <textarea id="content" name="content" rows="20" placeholder="使用Markdown语法撰写文章..."></textarea>
            </div>
            <div class="preview-pane">
                <h3>实时预览</h3>
                <div id="preview" class="preview-content"></div>
            </div>
        </div>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>状态</label>
            <select id="status" name="status">
                <option value="1">发布</option>
                <option value="0">草稿</option>
            </select>
        </div>
        <div class="form-group">
            <label>置顶</label>
            <select id="is_top" name="is_top">
                <option value="0">不置顶</option>
                <option value="1">置顶</option>
            </select>
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn-submit">发布文章</button>
        <a href="#(ctx)/admin/articles" class="btn-cancel">取消</a>
    </div>
</form>

#@adminFooter()

<!-- 首选方案：BootCDN -->
<script src="https://cdn.bootcdn.net/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/marked/11.1.1/marked.min.js"></script>

<!-- 备用方案：如果加载失败，自动回退到 Staticfile CDN -->
<script>
                    window.addEventListener('load', function () {
                        // 检测 marked 和 hljs 是否加载成功
                        if (typeof marked === 'undefined') {
                            var fallbackMarked = document.createElement('script');
                            fallbackMarked.src = 'https://cdn.staticfile.org/marked/11.1.1/marked.min.js';
                            document.head.appendChild(fallbackMarked);
                        }
                        if (typeof hljs === 'undefined') {
                            var fallbackHljs = document.createElement('script');
                            fallbackHljs.src = 'https://cdn.staticfile.org/highlight.js/11.9.0/highlight.min.js';
                            fallbackHljs.onload = function () {
                                hljs.highlightAll();
                            };
                            document.head.appendChild(fallbackHljs);
                        }
                    });
</script>

<script>
    // 统一处理工具栏点击
    document.querySelector('.toolbar').addEventListener('click', function (e) {
        if (e.target.tagName === 'BUTTON') {
            let syntax = e.target.getAttribute('data-markdown');
            if (syntax) {
                insertMarkdown(syntax);
            }
        }
    });
    // 标签管理
    let tags = [];
    const tagContainer = document.getElementById('tagContainer');
    const tagInput = document.getElementById('tagInput');
    const tagsHidden = document.getElementById('tags');

    tagInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ',') {
            e.preventDefault();
            let tag = this.value.trim();
            if (tag && !tags.includes(tag)) {
                tags.push(tag);
                updateTagDisplay();
            }
            this.value = '';
        }
    });

    function updateTagDisplay() {
        tagContainer.innerHTML = '';
        tags.forEach((tag, index) => {
            const tagSpan = document.createElement('span');
            tagSpan.className = 'tag';
            tagSpan.innerHTML = `${tag} <span class="remove" onclick="removeTag(${index})">×</span>`;
            tagContainer.appendChild(tagSpan);
        });
        tagContainer.appendChild(tagInput);
        tagsHidden.value = tags.join(',');
    }

    function removeTag(index) {
        tags.splice(index, 1);
        updateTagDisplay();
    }

    // 生成slug
    function generateSlug() {
        let title = document.getElementById('title').value;
        let slug = title.toLowerCase()
                .replace(/[^a-z0-9\u4e00-\u9fa5]+/g, '-')
                .replace(/^-|-$/g, '');
        document.getElementById('slug').value = slug;
        updateSlugPreview();
    }

    function updateSlugPreview() {
        let slug = document.getElementById('slug').value;
        let preview = document.getElementById('slugPreview');
        if (preview) {
            preview.innerHTML = '#(ctx)/article/' + (slug || '...');
        }
    }

    document.getElementById('title').addEventListener('input', function () {
        if (!document.getElementById('slug').value) {
            generateSlug();
        }
    });

    document.getElementById('slug').addEventListener('input', updateSlugPreview);

    // Markdown预览
    let contentTextarea = document.getElementById('content');
    let previewDiv = document.getElementById('preview');

    function updatePreview() {
        let markdown = contentTextarea.value;
        if (typeof marked !== 'undefined') {
            let html = marked.parse(markdown);
            previewDiv.innerHTML = html;
            if (typeof hljs !== 'undefined') {
                document.querySelectorAll('#preview pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
        }
    }

    contentTextarea.addEventListener('input', updatePreview);

  // 插入Markdown语法
function insertMarkdown(syntax) {
    let start = contentTextarea.selectionStart;
    let end = contentTextarea.selectionEnd;
    let text = contentTextarea.value;
    let selectedText = text.substring(start, end);
    
    // 核心逻辑：如果用户选中了文字，就用选中的文字替换模板里的“文本/代码/url”
    // 如果没有选中文字，就保留模板里的默认提示词（如“文本”、“链接”）
    let insertText = syntax
        .replace('文本', selectedText || '文本')
        .replace('代码', selectedText || '代码内容')
        .replace('链接', selectedText || '链接描述')
        .replace('url', selectedText || 'url');

    let newText = text.substring(0, start) + insertText + text.substring(end);
    contentTextarea.value = newText;
    
    let newCursorPos = start + insertText.length;
    contentTextarea.setSelectionRange(newCursorPos, newCursorPos);
    contentTextarea.focus();
    updatePreview();
}

    // 提交表单
    document.getElementById('articleForm').addEventListener('submit', function (e) {
        e.preventDefault();

        let title = document.getElementById('title').value;
        if (!title) {
            alert('请输入文章标题');
            return;
        }

        let content = document.getElementById('content').value;
        if (!content) {
            alert('请输入文章内容');
            return;
        }

        let formData = new URLSearchParams();
        formData.append('title', document.getElementById('title').value);
        formData.append('slug', document.getElementById('slug').value);
        formData.append('summary', document.getElementById('summary').value);
        formData.append('content', document.getElementById('content').value);
        formData.append('category_id', document.getElementById('category_id').value);
        formData.append('tags', document.getElementById('tags').value);
        formData.append('status', document.getElementById('status').value);
        formData.append('is_top', document.getElementById('is_top').value);
        fetch('#(ctx)/admin/doPublish', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: formData.toString()
        })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('发布成功！');
                        window.location.href = '#(ctx)/admin/articles';
                    } else {
                        alert('发布失败：' + (data.message || '未知错误'));
                    }
                })
                .catch(error => {
                    alert('请求失败：' + error.message);
                });
    });

    // 初始化预览
    updatePreview();
    updateSlugPreview();
</script>
