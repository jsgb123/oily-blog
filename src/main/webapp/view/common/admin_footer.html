// 居中弹窗提示
    function showMsg(text, type) {
        // 创建遮罩层
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;';

        // 创建弹窗
        var dialog = document.createElement('div');
        dialog.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:12px;padding:25px 35px;min-width:300px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:10001;';

        // 图标
        var icon = document.createElement('div');
        var iconText = '';
        var iconColor = '';
        if (type === 'success') {
            iconText = '✓';
            iconColor = '#5cb85c';
        } else if (type === 'error') {
            iconText = '✗';
            iconColor = '#d9534f';
        } else if (type === 'warning') {
            iconText = '⚠';
            iconColor = '#f0ad4e';
        } else {
            iconText = 'ℹ';
            iconColor = '#5bc0de';
        }
        icon.style.cssText = 'font-size:48px;color:' + iconColor + ';margin-bottom:15px;';
        icon.textContent = iconText;

        // 消息文本
        var msg = document.createElement('div');
        msg.style.cssText = 'font-size:16px;color:#333;margin-bottom:20px;line-height:1.5;';
        msg.textContent = text;

        // 确认按钮
        var btn = document.createElement('button');
        btn.style.cssText = 'background:#667eea;color:#fff;border:none;padding:8px 25px;border-radius:6px;cursor:pointer;font-size:14px;transition:all 0.2s;';
        btn.textContent = '确定';
        btn.onmouseover = function () {
            this.style.background = '#5a67d8';
        };
        btn.onmouseout = function () {
            this.style.background = '#667eea';
        };
        btn.onclick = function () {
            document.body.removeChild(overlay);
        };

        dialog.appendChild(icon);
        dialog.appendChild(msg);
        dialog.appendChild(btn);
        overlay.appendChild(dialog);
        document.body.appendChild(overlay);

        // 3秒后自动关闭
        setTimeout(function () {
            if (overlay && overlay.parentElement) {
                document.body.removeChild(overlay);
            }
        }, 3000);
    }

// 确认框（需要选择）
    function confirmDialog(text, callback) {
        var overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;';

        var dialog = document.createElement('div');
        dialog.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:12px;padding:25px 35px;min-width:320px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:10001;';

        var icon = document.createElement('div');
        icon.style.cssText = 'font-size:48px;color:#f0ad4e;margin-bottom:15px;';
        icon.textContent = '⚠';

        var msg = document.createElement('div');
        msg.style.cssText = 'font-size:16px;color:#333;margin-bottom:25px;line-height:1.5;';
        msg.textContent = text;

        var btnGroup = document.createElement('div');
        btnGroup.style.cssText = 'display:flex;gap:15px;justify-content:center;';

        var cancelBtn = document.createElement('button');
        cancelBtn.style.cssText = 'background:#e2e8f0;color:#4a5568;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;transition:all 0.2s;';
        cancelBtn.textContent = '取消';
        cancelBtn.onmouseover = function () {
            this.style.background = '#cbd5e0';
        };
        cancelBtn.onmouseout = function () {
            this.style.background = '#e2e8f0';
        };
        cancelBtn.onclick = function () {
            document.body.removeChild(overlay);
            if (callback)
                callback(false);
        };

        var confirmBtn = document.createElement('button');
        confirmBtn.style.cssText = 'background:#f56565;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:14px;transition:all 0.2s;';
        confirmBtn.textContent = '确定';
        confirmBtn.onmouseover = function () {
            this.style.background = '#e53e3e';
        };
        confirmBtn.onmouseout = function () {
            this.style.background = '#f56565';
        };
        confirmBtn.onclick = function () {
            document.body.removeChild(overlay);
            if (callback)
                callback(true);
        };

        btnGroup.appendChild(cancelBtn);
        btnGroup.appendChild(confirmBtn);
        dialog.appendChild(icon);
        dialog.appendChild(msg);
        dialog.appendChild(btnGroup);
        overlay.appendChild(dialog);
        document.body.appendChild(overlay);
    }

</script>
