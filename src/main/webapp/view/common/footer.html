<script>
    function showQRCode(type) {
        // 移除已存在的弹窗
        var existingModal = document.querySelector('.qrcode-modal');
        if (existingModal) {
            existingModal.remove();
        }

        // 二维码图片配置
        var qrcodeConfig = {
            'bytecode': {
                img: '#(ctx)/assets/imgs/qrcode_for_bytecode.jpg',
                title: '微信公众号【会编码】',
                desc: '关注获得更多游戏编程技术'
            },
            'xiamixiake': {
                img: '#(ctx)/assets/imgs/qrcode_for_xiamixiake.jpg',
                title: '微信公众号【虾米虾壳】',
                desc: '关注获得更多游戏逆向技术'
            }
        };

        var config = qrcodeConfig[type];
        if (!config)
            return;

        // 创建弹窗
        var modal = document.createElement('div');
        modal.className = 'qrcode-modal';
        modal.innerHTML = `
        <div class="qrcode-modal-content">
            <span class="qrcode-close">&times;</span>
            <div class="qrcode-modal-img">
                <img src="${config.img}" alt="${config.title}">
            </div>
            <h4>${config.title}</h4>
            <p>${config.desc}</p>
        </div>
    `;

        document.body.appendChild(modal);

        // 关闭按钮
        modal.querySelector('.qrcode-close').onclick = function () {
            modal.remove();
        };

        // 点击背景关闭
        modal.onclick = function (e) {
            if (e.target === modal) {
                modal.remove();
            }
        };
    }
</script>
